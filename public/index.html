<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>수업 필기 사진함</title>
<style>
:root{
  --bg:#0a0a0a;
  --bg2:#111;
  --bg3:#1a1a1a;
  --line:rgba(255,255,255,.08);
  --line2:rgba(255,255,255,.14);
  --text:#e8e8e8;
  --muted:#8d8d8d;
  --muted2:#5b5b5b;
  --white:#fff;
  --good:#52c87a;
  --bad:#e05252;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif}
body.gallery-active{overflow:hidden}
button,input{font:inherit}
button{cursor:pointer;border:0;background:none;color:inherit}
img{display:block;max-width:100%}
#header{
  position:sticky;top:0;z-index:20;height:54px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)
}
.logo{font-size:1.12rem;font-weight:900;letter-spacing:.1em;color:var(--white);white-space:nowrap}
.logo span{color:var(--muted)}
.header-actions{display:flex;align-items:center;gap:9px;min-width:0}
.hbtn{
  height:34px;padding:0 13px;border-radius:6px;border:1px solid var(--line2);
  background:transparent;color:var(--text);font-size:13px;font-weight:700;white-space:nowrap
}
.hbtn:hover{background:var(--bg3);border-color:#d0d0d0}
.hbtn.primary{background:var(--white);color:#111;border-color:var(--white)}
.hbtn.danger{border-color:rgba(224,82,82,.38);color:#ff8b8b}
.page{max-width:1100px;margin:0 auto;padding:34px 20px 80px}
.topline{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:18px}
.title h1{font-size:1.8rem;line-height:1.25;color:var(--white);letter-spacing:0}
.title p{margin-top:8px;color:var(--muted);font-size:14px}
.calendar-panel{margin-bottom:22px}
.calendar-nav{display:flex;align-items:center;gap:8px}
.calendar-title{min-width:112px;text-align:center;font-size:14px;font-weight:850;color:var(--white)}
.calendar-week,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.calendar-week{border-bottom:1px solid var(--line);background:#0f0f0f}
.calendar-week span{padding:10px 6px;text-align:center;font-size:12px;color:var(--muted);font-weight:700}
.calendar-grid{background:var(--line);gap:1px}
.cal-day{
  min-height:74px;padding:9px 10px;background:var(--bg2);text-align:left;
  display:flex;flex-direction:column;justify-content:space-between;transition:background .15s
}
.cal-day:hover{background:var(--bg3)}
.cal-day.muted{color:var(--muted2);background:#0d0d0d}
.cal-day.selected{outline:1px solid var(--white);outline-offset:-1px;background:#1d1d1d}
.cal-day.today .cal-num{color:var(--good)}
.cal-num{font-size:13px;font-weight:850;color:var(--white)}
.cal-day.muted .cal-num{color:var(--muted2)}
.cal-meta{min-height:17px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--good);display:inline-block;flex:0 0 auto}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:22px;align-items:start}
.panel{border:1px solid var(--line);background:var(--bg2)}
.panel-head{
  min-height:47px;padding:13px 16px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.panel-head strong{font-size:13px;color:var(--white);letter-spacing:.06em}
.small{font-size:12px;color:var(--muted)}
.days{display:flex;flex-direction:column}
.day{
  display:grid;grid-template-columns:1fr 78px;gap:12px;align-items:center;
  min-height:82px;padding:14px 16px;border-bottom:1px solid var(--line);
  text-align:left;transition:background .15s
}
.day:last-child{border-bottom:0}
.day:hover,.day.active{background:var(--bg3)}
.day-date{font-size:1.05rem;font-weight:850;color:var(--white)}
.day-meta{margin-top:6px;color:var(--muted);font-size:12px}
.cover{width:78px;height:54px;border-radius:4px;background:#202020;overflow:hidden;border:1px solid var(--line)}
.cover img{width:100%;height:100%;object-fit:cover}
.empty{padding:48px 20px;text-align:center;color:var(--muted);font-size:14px}
.viewer{min-height:420px}
.selected-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.selected-title h2{font-size:1.2rem;color:var(--white);letter-spacing:0}
.upload{
  display:none;padding:16px;border-bottom:1px solid var(--line);background:#0f0f0f
}
.upload.open{display:block}
.drop{
  border:1px dashed var(--line2);border-radius:8px;padding:18px;
  display:grid;gap:12px;background:rgba(255,255,255,.02)
}
.drop-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type="date"],input[type="text"],input[type="password"],input[type="file"]{
  background:var(--bg3);border:1px solid var(--line2);color:var(--text);
  border-radius:6px;min-height:38px;padding:8px 10px
}
input[type="file"]{width:100%;color:var(--muted)}
.photos{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1px;background:var(--line)}
.photo{background:var(--bg2);position:relative;min-height:220px}
.photo a{display:block;width:100%;height:100%}
.photo img{width:100%;height:100%;max-height:520px;object-fit:contain;background:#070707}
.photo-info{
  position:absolute;left:0;right:0;bottom:0;padding:22px 12px 10px;
  display:flex;justify-content:space-between;gap:8px;align-items:end;
  background:linear-gradient(to top,rgba(0,0,0,.76),rgba(0,0,0,0));
  opacity:0;transition:opacity .15s
}
.photo:hover .photo-info{opacity:1}
.photo-name{font-size:12px;color:#dcdcdc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{
  width:30px;height:30px;border-radius:6px;border:1px solid var(--line2);
  background:rgba(10,10,10,.78);display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;font-size:16px
}
.icon-btn:hover{border-color:#fff}
.gallery{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);
  display:none;grid-template-rows:56px minmax(0,1fr) 58px
}
.gallery.open{display:grid}
.gallery-top,.gallery-bottom{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:0 18px;background:rgba(10,10,10,.8);border-color:var(--line)
}
.gallery-top{border-bottom:1px solid var(--line)}
.gallery-bottom{border-top:1px solid var(--line)}
.gallery-heading{min-width:0;display:grid;gap:3px}
.gallery-title{
  min-width:0;font-size:16px;font-weight:800;color:var(--white);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.gallery-date{font-size:12px;color:var(--muted);white-space:nowrap}
.gallery-count{font-size:12px;color:var(--muted);white-space:nowrap}
.gallery-stage{
  position:relative;display:grid;place-items:center;min-height:0;
  height:calc(100vh - 114px);padding:16px 64px;overflow:hidden
}
.gallery-stage img{
  width:auto;height:auto;max-width:100%;max-height:calc(100vh - 146px);
  object-fit:contain;transform:scale(var(--zoom,1));transform-origin:center center;
  transition:transform .08s ease;user-select:none
}
.gallery-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:56px;border-radius:7px;border:1px solid var(--line2);
  background:rgba(20,20,20,.72);font-size:30px;line-height:1
}
.gallery-nav:hover{background:rgba(40,40,40,.9);border-color:#fff}
.gallery-prev{left:14px}.gallery-next{right:14px}
.gallery-close{width:34px;height:34px;font-size:22px}
.login-screen{
  min-height:calc(100vh - 54px);display:grid;place-items:center;padding:24px
}
.login-card{
  width:min(390px,100%);border:1px solid var(--line);background:var(--bg2);
  padding:24px
}
.login-card h1{font-size:1.45rem;color:var(--white);margin-bottom:8px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:18px}
.form{display:grid;gap:10px}
.form .hbtn{width:100%;height:40px}
.toast{
  position:fixed;left:50%;bottom:22px;z-index:50;transform:translateX(-50%) translateY(18px);
  background:#1c1c1c;border:1px solid var(--line2);padding:10px 14px;border-radius:7px;
  color:var(--text);font-size:13px;opacity:0;pointer-events:none;transition:.2s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
@media (max-width:820px){
  #header{padding:0 14px}.page{padding:24px 12px 60px}
  .topline{align-items:start;flex-direction:column}.layout{grid-template-columns:1fr}
  .cal-day{min-height:58px;padding:7px}.cal-meta{font-size:10px}
  .photos{grid-template-columns:1fr}.photo{min-height:260px}
  .gallery-stage{padding:10px 48px}.gallery-stage img{max-height:calc(100vh - 134px)}
  .gallery-nav{width:36px;height:50px}
  .title h1{font-size:1.45rem}.header-actions{gap:6px}.hbtn{padding:0 10px}
}
</style>
</head>
<body>
<header id="header">
  <div class="logo">MATH<span>BOARD</span></div>
  <div class="header-actions">
    <button class="hbtn" id="refreshBtn">새로고침</button>
    <button class="hbtn danger hidden" id="logoutBtn">로그아웃</button>
  </div>
</header>

<main id="loginScreen" class="login-screen">
  <section class="login-card">
    <h1>수업 필기 사진함</h1>
    <p>학원 칠판 필기 사진을 날짜별로 정리해서 보는 관리자 화면입니다.</p>
    <form class="form" id="loginForm">
      <input id="password" type="password" autocomplete="current-password" placeholder="비밀번호">
      <button class="hbtn primary" type="submit">로그인</button>
    </form>
  </section>
</main>

<main id="app" class="page hidden">
  <div class="topline">
    <div class="title">
      <h1>일별 수업 필기</h1>
      <p>최신 날짜가 위에 오고, 날짜를 누르면 그날 찍은 사진과 업로드 창이 열립니다.</p>
    </div>
    <button class="hbtn primary" id="todayBtn">오늘 날짜 열기</button>
  </div>

  <section class="panel calendar-panel">
    <div class="panel-head">
      <strong>CALENDAR</strong>
      <div class="calendar-nav">
        <button class="hbtn" id="prevMonthBtn" type="button">‹</button>
        <span class="calendar-title" id="calendarTitle"></span>
        <button class="hbtn" id="nextMonthBtn" type="button">›</button>
      </div>
    </div>
    <div class="calendar-week">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </section>

  <section class="layout">
    <aside class="panel">
      <div class="panel-head">
        <strong>DATE FEED</strong>
        <span class="small" id="dayCount">0일</span>
      </div>
      <div class="days" id="days"></div>
    </aside>

    <section class="panel viewer">
      <div class="panel-head">
        <div class="selected-title">
          <h2 id="selectedDate">날짜를 선택하세요</h2>
          <span class="small" id="photoCount"></span>
        </div>
        <button class="hbtn" id="toggleUploadBtn">업로드</button>
      </div>

      <form class="upload" id="uploadForm">
        <div class="drop">
          <div class="drop-row">
            <input type="date" id="uploadDate" required>
            <button class="hbtn primary" type="submit">사진 올리기</button>
          </div>
          <input type="file" id="photosInput" name="photos" accept="image/*" multiple required>
          <p class="small">JPG, PNG, GIF, WEBP, AVIF 이미지를 여러 장 한 번에 올릴 수 있습니다.</p>
        </div>
      </form>

      <div id="photos" class="photos hidden"></div>
      <div id="emptyPhotos" class="empty">왼쪽에서 날짜를 선택하거나 오늘 날짜를 열어 업로드해 주세요.</div>
    </section>
  </section>
</main>

<div class="toast" id="toast"></div>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-top">
    <div class="gallery-heading">
      <div class="gallery-title" id="galleryTitle"></div>
      <div class="gallery-date" id="galleryDate"></div>
    </div>
    <button class="icon-btn gallery-close" id="galleryCloseBtn" type="button" aria-label="닫기">×</button>
  </div>
  <div class="gallery-stage">
    <button class="gallery-nav gallery-prev" id="galleryPrevBtn" type="button" aria-label="이전">‹</button>
    <img id="galleryImage" alt="">
    <button class="gallery-nav gallery-next" id="galleryNextBtn" type="button" aria-label="다음">›</button>
  </div>
  <div class="gallery-bottom">
    <span class="gallery-count" id="galleryCount"></span>
    <a class="hbtn" id="galleryOpenOriginal" href="#" target="_blank" rel="noreferrer">원본 열기</a>
  </div>
</section>

<script>
const $ = (selector) => document.querySelector(selector);
const state = {
  token: localStorage.getItem('mathArchiveToken') || '',
  days: [],
  selectedDate: '',
  calendarMonth: today().slice(0, 7),
  currentPhotos: [],
  galleryIndex: 0,
  galleryZoom: 1
};

function toast(message) {
  const el = $('#toast');
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.classList.remove('show'), 2200);
}

function today() {
  const d = new Date();
  const offset = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - offset).toISOString().slice(0, 10);
}

function dateKey(year, month, day) {
  return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
}

function setCalendarMonth(date) {
  state.calendarMonth = date.slice(0, 7);
}

async function api(path, options = {}) {
  const headers = options.headers || {};
  if (state.token) headers.Authorization = `Bearer ${state.token}`;
  const res = await fetch(path, { ...options, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || '요청을 처리하지 못했습니다.');
  return data;
}

function showApp() {
  const loggedIn = Boolean(state.token);
  $('#loginScreen').classList.toggle('hidden', loggedIn);
  $('#app').classList.toggle('hidden', !loggedIn);
  $('#logoutBtn').classList.toggle('hidden', !loggedIn);
  if (loggedIn) loadDays();
}

function renderDays() {
  $('#dayCount').textContent = `${state.days.length}일`;
  const wrap = $('#days');
  wrap.innerHTML = '';
  if (state.days.length === 0) {
    wrap.innerHTML = '<div class="empty">아직 업로드된 날짜가 없습니다.</div>';
    return;
  }

  for (const day of state.days) {
    const btn = document.createElement('button');
    btn.className = `day ${day.date === state.selectedDate ? 'active' : ''}`;
    btn.type = 'button';
    btn.innerHTML = `
      <div>
        <div class="day-date">${day.date}</div>
        <div class="day-meta">사진 ${day.count}장</div>
      </div>
      <div class="cover">${day.cover ? `<img src="${day.cover}" alt="">` : ''}</div>
    `;
    btn.addEventListener('click', () => selectDate(day.date, true));
    wrap.appendChild(btn);
  }
}

function renderCalendar() {
  const grid = $('#calendarGrid');
  const [year, month] = state.calendarMonth.split('-').map(Number);
  const first = new Date(year, month - 1, 1);
  const start = new Date(year, month - 1, 1 - first.getDay());
  const counts = new Map(state.days.map((day) => [day.date, day.count]));

  $('#calendarTitle').textContent = `${year}년 ${month}월`;
  grid.innerHTML = '';

  for (let i = 0; i < 42; i += 1) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const key = dateKey(d.getFullYear(), d.getMonth() + 1, d.getDate());
    const count = counts.get(key) || 0;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = [
      'cal-day',
      d.getMonth() + 1 === month ? '' : 'muted',
      key === state.selectedDate ? 'selected' : '',
      key === today() ? 'today' : ''
    ].filter(Boolean).join(' ');
    btn.innerHTML = `
      <span class="cal-num">${d.getDate()}</span>
      <span class="cal-meta">${count ? `<span class="cal-dot"></span>${count}장` : ''}</span>
    `;
    btn.addEventListener('click', () => selectDate(key, true, true));
    grid.appendChild(btn);
  }
}

async function loadDays() {
  const data = await api('/api/days');
  state.days = data.days || [];
  renderDays();
  renderCalendar();
  if (state.selectedDate) await loadPhotos(state.selectedDate);
}

async function selectDate(date, openUpload, scrollToViewer = false) {
  state.selectedDate = date;
  setCalendarMonth(date);
  $('#uploadDate').value = date;
  $('#selectedDate').textContent = date;
  $('#uploadForm').classList.toggle('open', Boolean(openUpload));
  renderDays();
  renderCalendar();
  await loadPhotos(date);
  if (scrollToViewer) {
    document.querySelector('.viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function loadPhotos(date) {
  const data = await api(`/api/days/${date}/photos`);
  const photos = data.photos || [];
  state.currentPhotos = photos;
  $('#photoCount').textContent = photos.length ? `사진 ${photos.length}장` : '사진 없음';
  const grid = $('#photos');
  const empty = $('#emptyPhotos');
  grid.innerHTML = '';
  grid.classList.toggle('hidden', photos.length === 0);
  empty.classList.toggle('hidden', photos.length > 0);
  empty.textContent = `${date}에 올라온 사진이 없습니다. 업로드 버튼으로 추가해 주세요.`;

  for (const photo of photos) {
    const index = photos.indexOf(photo);
    const item = document.createElement('article');
    item.className = 'photo';
    item.innerHTML = `
      <a href="${photo.url}" data-gallery-index="${index}"><img src="${photo.url}" alt="${photo.originalName}"></a>
      <div class="photo-info">
        <div class="photo-name">${photo.originalName}</div>
        <button class="icon-btn" type="button" title="삭제" aria-label="삭제">×</button>
      </div>
    `;
    item.querySelector('a').addEventListener('click', (event) => {
      event.preventDefault();
      openGallery(index);
    });
    item.querySelector('button').addEventListener('click', async () => {
      if (!confirm('이 사진을 삭제할까요?')) return;
      await api(`/api/photos/${photo.id}`, { method: 'DELETE' });
      toast('삭제했습니다.');
      await loadDays();
      await loadPhotos(state.selectedDate);
    });
    grid.appendChild(item);
  }

  return photos;
}

function renderGallery() {
  const photo = state.currentPhotos[state.galleryIndex];
  if (!photo) return closeGallery();
  $('#galleryImage').src = photo.url;
  $('#galleryImage').alt = photo.originalName;
  $('#galleryTitle').textContent = photo.originalName;
  $('#galleryDate').textContent = `${photo.date} 업로드`;
  $('#galleryCount').textContent = `${state.galleryIndex + 1} / ${state.currentPhotos.length}`;
  $('#galleryOpenOriginal').href = photo.url;
  $('#galleryImage').style.setProperty('--zoom', state.galleryZoom);
}

function openGallery(index) {
  if (state.currentPhotos.length === 0) return;
  state.galleryIndex = index;
  state.galleryZoom = 1;
  renderGallery();
  $('#gallery').classList.add('open');
  $('#gallery').setAttribute('aria-hidden', 'false');
  document.body.classList.add('gallery-active');
}

function closeGallery() {
  $('#gallery').classList.remove('open');
  $('#gallery').setAttribute('aria-hidden', 'true');
  $('#galleryImage').src = '';
  document.body.classList.remove('gallery-active');
  state.galleryZoom = 1;
}

async function openAdjacentDate(step) {
  const currentDay = state.days.findIndex((day) => day.date === state.selectedDate);
  const nextDay = currentDay + step;
  if (currentDay === -1 || nextDay < 0 || nextDay >= state.days.length) {
    toast(step > 0 ? '다음 날짜 사진이 없습니다.' : '이전 날짜 사진이 없습니다.');
    return;
  }

  const date = state.days[nextDay].date;
  await selectDate(date, false, false);
  if (state.currentPhotos.length === 0) return;
  state.galleryIndex = step > 0 ? 0 : state.currentPhotos.length - 1;
  state.galleryZoom = 1;
  renderGallery();
}

async function moveGallery(step) {
  const total = state.currentPhotos.length;
  if (!total) return;
  const nextIndex = state.galleryIndex + step;
  if (nextIndex < 0 || nextIndex >= total) {
    await openAdjacentDate(step);
    return;
  }
  state.galleryIndex = nextIndex;
  state.galleryZoom = 1;
  renderGallery();
}

function zoomGallery(delta) {
  const next = Math.min(4, Math.max(0.5, state.galleryZoom + delta));
  state.galleryZoom = Math.round(next * 10) / 10;
  $('#galleryImage').style.setProperty('--zoom', state.galleryZoom);
  $('#galleryCount').textContent = `${state.galleryIndex + 1} / ${state.currentPhotos.length} · ${Math.round(state.galleryZoom * 100)}%`;
}

$('#loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  try {
    const data = await api('/api/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: $('#password').value })
    });
    state.token = data.token;
    localStorage.setItem('mathArchiveToken', state.token);
    toast('로그인했습니다.');
    showApp();
  } catch (error) {
    toast(error.message);
  }
});

$('#logoutBtn').addEventListener('click', () => {
  state.token = '';
  localStorage.removeItem('mathArchiveToken');
  showApp();
});

$('#refreshBtn').addEventListener('click', () => {
  if (state.token) loadDays().then(() => toast('새로고침했습니다.')).catch((error) => toast(error.message));
});

$('#todayBtn').addEventListener('click', () => selectDate(today(), true, true));

$('#prevMonthBtn').addEventListener('click', () => {
  const [year, month] = state.calendarMonth.split('-').map(Number);
  const d = new Date(year, month - 2, 1);
  state.calendarMonth = dateKey(d.getFullYear(), d.getMonth() + 1, 1).slice(0, 7);
  renderCalendar();
});

$('#nextMonthBtn').addEventListener('click', () => {
  const [year, month] = state.calendarMonth.split('-').map(Number);
  const d = new Date(year, month, 1);
  state.calendarMonth = dateKey(d.getFullYear(), d.getMonth() + 1, 1).slice(0, 7);
  renderCalendar();
});

$('#toggleUploadBtn').addEventListener('click', () => {
  if (!state.selectedDate) selectDate(today(), true);
  else $('#uploadForm').classList.toggle('open');
});

$('#galleryCloseBtn').addEventListener('click', closeGallery);
$('#galleryPrevBtn').addEventListener('click', () => moveGallery(-1));
$('#galleryNextBtn').addEventListener('click', () => moveGallery(1));
$('#gallery').addEventListener('click', (event) => {
  if (event.target.id === 'gallery') closeGallery();
});
$('#gallery').addEventListener('wheel', (event) => {
  if (!event.ctrlKey) return;
  event.preventDefault();
  zoomGallery(event.deltaY < 0 ? 0.1 : -0.1);
}, { passive: false });
document.addEventListener('keydown', (event) => {
  if (!$('#gallery').classList.contains('open')) return;
  if (event.key === 'Escape') closeGallery();
  if (event.key === 'ArrowLeft') moveGallery(-1);
  if (event.key === 'ArrowRight') moveGallery(1);
  if (event.key === '<' || event.key === ',') moveGallery(-1);
  if (event.key === '>' || event.key === '.') moveGallery(1);
});

$('#uploadForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const files = $('#photosInput').files;
  const date = $('#uploadDate').value;
  if (!date || files.length === 0) return toast('날짜와 사진을 선택해 주세요.');

  const form = new FormData();
  form.append('date', date);
  [...files].forEach((file) => form.append('photos', file));

  try {
    $('#uploadForm button[type="submit"]').disabled = true;
    await api('/api/photos', { method: 'POST', body: form });
    $('#photosInput').value = '';
    toast('업로드했습니다.');
    await selectDate(date, false);
    await loadDays();
  } catch (error) {
    toast(error.message);
  } finally {
    $('#uploadForm button[type="submit"]').disabled = false;
  }
});

$('#uploadDate').value = today();
showApp();
</script>
</body>
</html>
